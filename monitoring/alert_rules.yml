groups:

# -----------------------
# Recording Rules
# -----------------------
- name: recording_rules
  rules:

  - record: app:request_rate
    expr: rate(arxiv_requests_total[1m])

  - record: app:error_rate
    expr: rate(prediction_errors_total[1m])

  - record: app:latency_p95
    expr: >
      histogram_quantile(
        0.95,
        rate(frontend_latency_seconds_bucket[2m])
      )

# -----------------------
# Alert Rules
# -----------------------
- name: alert_rules
  rules:

  - alert: HighErrorRate
    expr: app:error_rate > 0.1
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "High error rate detected"
      description: "Error rate > 10% in last minute"

  - alert: HighCPUUsage
    expr: 100 * (1 - avg(rate(node_cpu_seconds_total{mode="idle"}[2m]))) > 60
    for: 2m
    labels:
      severity: warning
    annotations:
      summary: "CPU usage high"
      description: "CPU usage above 60% for 2 minutes"

  - alert: HighFrontendLatency
    expr: app:latency_p95 > 2
    for: 1m
    labels:
      severity: warning
    annotations:
      summary: "High frontend latency"
      description: "P95 latency > 2 seconds"

  - alert: AppDown
    expr: up{job="arxiv-frontend"} == 0
    for: 30s
    labels:
      severity: critical
    annotations:
      summary: "App is down"
      description: "Frontend metrics endpoint unreachable"